<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cv-gen</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header>
        <h1>cv-gen</h1>
        <doc-upload hidden></doc-upload>
        <template-selector></template-selector>
      </header>
      <div class="panels">
        <section class="editor">
          <div class="editor-tabs" hidden>
            <button class="tab-btn active" data-tab="original">Original</button>
            <button class="tab-btn" data-tab="adapted">Adaptado</button>
          </div>
          <div class="editor-panel editor-panel--original">
            <markdown-editor></markdown-editor>
            <job-adapt hidden></job-adapt>
          </div>
          <div class="editor-panel editor-panel--adapted" hidden>
            <textarea class="adapted-markdown-editor" spellcheck="false" placeholder="El CV adaptado aparecerá aquí..."></textarea>
            <cv-suggestions></cv-suggestions>
          </div>
        </section>
        <section class="preview">
          <pdf-preview></pdf-preview>
        </section>
      </div>
    </div>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
